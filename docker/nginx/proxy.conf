resolver  127.0.0.11 valid=10s;  # recover from the backend's IP changing

log_format amplify_ext '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     '"$host" sn="$server_name" '
                     'rt=$request_time '
                     'ua="$upstream_addr" us="$upstream_status" '
                     'ut="$upstream_response_time" ul="$upstream_response_length" '
                     'cs=$upstream_cache_status';

server {
    listen 80;
    listen [::]:80;

    server_tokens off;
    server_name $host;

    location / {
        # update port as needed for host mapped https
        return 301 https://$host:8011$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name wordpressdev.localhost;
    server_tokens off;

    ssl_stapling off;
    ssl_certificate      /etc/ssl/fullchain.pem;
    ssl_certificate_key  /etc/ssl/privkey.pem;

    root /var/www/html;
    index index.php;
    charset utf-8;
    default_type application/octet-stream;
 
    error_log /dev/stderr warn;
    access_log /dev/stdout amplify_ext;
    # access_log /var/log/nginx/access.log  amplify_ext;
    # error_log  /var/log/nginx/error.log   warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-XSS-Protection "1; mode=block" always;
    # add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src * data: 'unsafe-eval' 'unsafe-inline'" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/;
        internal;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri = 404;
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   frontend:9000;
        fastcgi_index  index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_intercept_errors on;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_connect_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.ht {
        deny all;
    }

    location = /favicon.ico {
        allow all; log_not_found off; access_log off;
    }

    location = /robots.txt {
        allow all; log_not_found off; access_log off;
    }

    location = /humans.txt {
        allow all; log_not_found off; access_log off;
    }

    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }


    location ~* \.(?:ico|css|js|mjs|gif|jpe?g|png|woff|woff2|ttf|svg|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, immutable";

        types {
            application/javascript js;
            application/javascript mjs;
            text/css css;
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/x-icon ico;
            font/woff woff;
            font/woff2 woff2;
            font/ttf ttf;
            font/eot eot;
            image/svg+xml svg;
        }
    }

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
}
