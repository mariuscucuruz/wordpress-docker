version: '3'

services:
  frontend:
    container_name: wordpress
    image: wordpress:6.4-fpm
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/wp/Dockerfile
      args:
        - UID=${UID:-(id -u)}
        - GID=${GID:-(id -g)}
        - WEBUSER=${WEBUSER:-(id -un)}
        - WEBGROUP=${WEBGROUP:-(id -gn)}
    ports:
      - 9000:9000
    links:
      - database
    depends_on:
      - database
    networks:
      - backend
      - frontend
    volumes:
      - wp-data:/var/www/html
      - ./wp/uploads:/var/www/html/wp-content/uploads:delegated
      - ./wp/plugins:/var/www/html/wp-content/plugins:delegated
      #- ./wp/themes:/var/www/html/wp-content/themes:rw
      - ./php/:/usr/local/etc/php/conf.d/:ro
    environment:
      - WORDPRESS_DOMAIN="https://${APP_HOST:-website.uk}/"
      - WORDPRESS_DB_HOST=${DB_HOST:-database}
      - WORDPRESS_DB_PORT=${DB_PORT:-3306}
      - WORDPRESS_DB_NAME=${DB_NAME:-wordpress}
      - WORDPRESS_DB_USER=${DB_USERNAME:-wpdbuser}
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD:-wpdbpassword}
      - WORDPRESS_DEBUG=true
      - WP_DEBUG_LOG=true
      - WORDPRESS_CONFIG_EXTRA=
          define('FS_METHOD', 'direct');
          define('WP_HOME', 'https://${APP_HOST:-website.uk}/');
          define('WP_SITEURL', 'https://${APP_HOST:-website.uk}/');
      - TZ=Europe/London

  database:
    container_name: database
    image: mysql:latest
    restart: unless-stopped
    networks:
      - backend
    command: [
      "--explicit_defaults_for_timestamp"
    ]
    volumes:
      - ./db:/docker-entrypoint-initdb.d/
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-wordpress}
      - MYSQL_USER=${DB_USERNAME:-wpdbuser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-wpdbpassword}
      - TZ=Europe/London

  proxy:
    container_name: proxy
    image: nginx:latest
    restart: unless-stopped
    tty: true
    ports:
      - 10382:80
      - 10543:443
      - :443
    networks:
      - backend
      - frontend
    depends_on:
      - frontend
    volumes_from:
      - frontend
    volumes:
      - ./nginx:/etc/nginx/conf.d/:ro
      - ./ssl:/etc/letsencrypt/live/website.uk:delegated
    environment:
      - TZ=Europe/London

volumes:
  wp-data:
  db-data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

