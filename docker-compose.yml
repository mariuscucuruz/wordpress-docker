version: '3'
services:
  frontend:
    container_name: damimporter_wp
    image: wordpress:6.4-fpm
    restart: unless-stopped
    # build:
    #   context: .
    #   dockerfile: ./docker/wp/Dockerfile
    #   args:
    #     - UID=${UID:-(id -u)}
    #     - GID=${GID:-(id -g)}
    #     - WEBUSER=${WEBUSER:-(id -un)}
    #     - WEBGROUP=${WEBGROUP:-(id -gn)}
    ports:
      # - "${APP_PORT:-9000}:9000"
      - "${APP_PORT:-8080}:80"
    links:
      - database
    depends_on:
      - database
    networks:
      - backend
      - frontend
    volumes:
      - wp-data:/var/www/html
      - ./wp/uploads:/var/www/html/wp-content/uploads:rw
      #- ./wp/themes:/var/www/html/wp-content/themes:rw
      - ./wp/plugins:/var/www/html/wp-content/plugins:rw
      - ./php/:/usr/local/etc/php/conf.d/
    environment:
      - WORDPRESS_DOMAIN="https://${APP_HOST:-website.uk}/"
      - WORDPRESS_DB_HOST=${DB_HOST:-database}
      - WORDPRESS_DB_PORT=${DB_PORT:-3306}
      - WORDPRESS_DB_NAME=${DB_NAME:-wordpress}
      - WORDPRESS_DB_USER=${DB_USERNAME:-wpdbuser}
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD:-wpdbpassword}
      - WORDPRESS_DEBUG=${WORDPRESS_DEBUG:-true}
      - WP_DEBUG_LOG={WORDPRESS_DEBUG:-true}
      - WORDPRESS_CONFIG_EXTRA=
          define('FS_METHOD', 'direct');
          define('WP_HOME', 'https://${APP_HOST:-website.uk}/');
          define('WP_SITEURL', 'https://${APP_HOST:-website.uk}/');
      - TZ=Europe/London

  database:
    container_name: damimporter_db
    image: mariadb:latest
    restart: always
    networks:
      - internal
    # command: [
    #   "--explicit_defaults_for_timestamp"
    # ]
    volumes:
      - ./db:/docker-entrypoint-initdb.d/
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-wordpress}
      - MYSQL_USER=${DB_USERNAME:-wpdbuser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-wpdbpassword}
      - TZ=Europe/London

  proxy:
    container_name: damimporter_proxy
    image: nginx:latest
    restart: unless-stopped
    tty: true
    ports:
      - 10382:80
      - 10543:443
      - :443
    networks:
      - public
    volumes_from:
      - frontend
    volumes:
      - ./nginx:/etc/nginx/conf.d/:ro
      - ./ssl:/etc/letsencrypt/live/website.uk:delegated
    environment:
      - API_KEY=${AMPLIFY_API_KEY}
      - NGINX_HOST=${APP_HOST:-www.website.uk}
      - NGINX_PORT=443
      - TZ=Europe/London

volumes:
  wp-data:
  db-data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

